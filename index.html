<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>winnerscore.net — For Sale</title>
<meta name="description" content="This domain is for sale. Contact maniaworksstudios@gmail.com.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Fraunces:ital@1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0418;
    --ink:#f0eaff;
    --dim:#9d8fc9;
    --accent:#a78bfa;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse 70% 55% at 50% 30%, #180e2c, var(--bg) 70%);
    color:var(--ink);
    font-family:'Sora',sans-serif;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    text-align:center;
  }
  .wrap{ max-width:560px; }
  .eyebrow{
    font-size:12px;letter-spacing:.4em;text-transform:uppercase;
    color:var(--accent);margin-bottom:22px;
  }
  h1{
    font-family:'Fraunces',serif;font-style:italic;font-weight:400;
    font-size:clamp(38px,7vw,64px);line-height:1.05;
    color:var(--ink);
  }
  .sub{
    margin-top:20px;font-size:17px;color:var(--dim);line-height:1.6;
  }
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    margin-top:36px;padding:16px 32px;border-radius:100px;
    background:var(--accent);color:#0a0a0c;font-weight:600;font-size:15px;
    text-decoration:none;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 10px 30px -10px rgba(167,139,250,.5); }
  .foot{
    margin-top:44px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#4a4a52;
  }

  /* ---------- music widget ---------- */
  #musicWrap{
    position:fixed;left:22px;bottom:22px;z-index:40;
    width:min(260px,86vw);padding:12px 16px;border-radius:14px;
    border:1px solid rgba(190,150,255,.22);background:rgba(16,8,36,.6);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    display:flex;align-items:center;gap:12px;
  }
  #musicPlayBtn{
    width:36px;height:36px;border-radius:50%;flex:0 0 auto;
    background:var(--accent);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s ease;
  }
  #musicPlayBtn:hover{ transform:scale(1.06); }
  #musicPlayBtn svg{ width:14px;height:14px;fill:#0a0a0c;margin-left:1px; }
  #musicInfo{ flex:1; min-width:0; text-align:left; }
  #musicTitle{ font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
  #musicSub{ font-size:10px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase }
  #musicVol{
    -webkit-appearance:none;appearance:none;width:52px;height:4px;border-radius:100px;
    background:rgba(190,150,255,.15);outline:none;cursor:pointer;flex:0 0 auto;
  }
  #musicVol::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;
    background:var(--accent);cursor:pointer;
  }
  #musicVol::-moz-range-thumb{
    width:12px;height:12px;border-radius:50%;border:none;background:var(--accent);cursor:pointer;
  }
  @media (max-width:600px){
    #musicWrap{ left:12px; bottom:12px; width:min(230px,80vw); }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">winnerscore.net</div>
  <h1>Want to buy this domain?</h1>
  <p class="sub">This domain is available for purchase. Reach out and let's talk.</p>
  <a class="btn" href="mailto:maniaworksstudios@gmail.com">
    ✉ Contact maniaworksstudios@gmail.com
  </a>
  <div class="foot">winnerscore.net</div>
</div>

<div id="musicWrap">
  <button id="musicPlayBtn" aria-label="Play music">
    <svg id="musicPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <div id="musicInfo">
    <div id="musicTitle">WHOOPA</div>
    <div id="musicSub">WHOOPA</div>
  </div>
  <input type="range" id="musicVol" min="0" max="30" value="30">
  <audio id="bgAudio" src="GORILLA GLUE, LIL NAKUR - WOOPAAA (SPOTISAVER).mp3" preload="auto" loop></audio>
</div>

<script>
  const bgAudio = document.getElementById('bgAudio');
  const musicBtn = document.getElementById('musicPlayBtn');
  const musicIcon = document.getElementById('musicPlayIcon');
  const musicVol = document.getElementById('musicVol');

  bgAudio.volume = musicVol.value / 30;

  function setMusicUI(isPlaying){
    musicIcon.innerHTML = isPlaying
      ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }

  function startMusic(){
    if (!bgAudio.paused) return;
    bgAudio.play().then(() => setMusicUI(true)).catch(() => {});
  }

  musicBtn.addEventListener('click', () => {
    if (bgAudio.paused) {
      bgAudio.play();
      setMusicUI(true);
    } else {
      bgAudio.pause();
      setMusicUI(false);
    }
  });

  musicVol.addEventListener('input', () => {
    bgAudio.volume = musicVol.value / 100;
  });

  startMusic();
  const firstMusicInteraction = () => {
    startMusic();
    document.removeEventListener('pointerdown', firstMusicInteraction);
    document.removeEventListener('keydown', firstMusicInteraction);
  };
  document.addEventListener('pointerdown', firstMusicInteraction);
  document.addEventListener('keydown', firstMusicInteraction);
</script>

</body>
</html>
